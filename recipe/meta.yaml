{% set name = "opentelemetry-sdk" %}
{% set version = "1.37.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_')}}-{{ version }}.tar.gz
  sha256: cc8e089c10953ded765b5ab5669b198bbe0af1b3f89f1007d19acd32dc46dda5

build:
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv
  skip: true  # [py<39]

requirements:
  host:
    - pip
    - python
    - hatchling
  run:
    - python
    - opentelemetry-api =={{ version }}
    - opentelemetry-semantic-conventions ==0.58b0
    - typing_extensions >=4.5.0

# E   ModuleNotFoundError: No module named 'opentelemetry.test'
# https://pypi.org/project/opentelemetry-test-utils, not in the main channel.
{% set ignore_tests = " --ignore=tests/metrics/exponential_histogram/test_exponent_mapping.py" %}
{% set ignore_tests = ignore_tests + " --ignore=tests/metrics/exponential_histogram/test_exponential_bucket_histogram_aggregation.py" %}
{% set ignore_tests = ignore_tests + " --ignore=tests/metrics/integration_test/test_console_exporter.py" %}
{% set ignore_tests = ignore_tests + " --ignore=tests/metrics/integration_test/test_exporter_concurrency.py" %}
{% set ignore_tests = ignore_tests + " --ignore=tests/metrics/test_backward_compat.py" %}
{% set ignore_tests = ignore_tests + " --ignore=tests/metrics/test_import.py" %}
{% set ignore_tests = ignore_tests + " --ignore=tests/metrics/test_metric_reader_storage.py" %}
{% set ignore_tests = ignore_tests + " --ignore=tests/metrics/test_metrics.py" %}
{% set ignore_tests = ignore_tests + " --ignore=tests/metrics/test_periodic_exporting_metric_reader.py" %}
{% set ignore_tests = ignore_tests + " --ignore=tests/trace/test_trace.py" %}

test:
  source_files:
    - tests
  imports:
    - opentelemetry.sdk
    - opentelemetry.sdk.resources
  commands:
    - pip check
    - pytest -v tests {{ ignore_tests }}
  requires:
    - pip
    - pytest >=7.4.4

about:
  summary: OpenTelemetry Python / SDK
  home: https://github.com/open-telemetry/opentelemetry-python/tree/master/opentelemetry-sdk
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  doc_url: https://opentelemetry-python.readthedocs.io
  dev_url: https://github.com/open-telemetry/opentelemetry-python/tree/master/opentelemetry-sdk
  description: |-
    OpenTelemetry, also known as OTel for short, is a vendor-neutral open-source
    Observability framework for instrumenting, generating, collecting, and exporting
    telemetry data such as traces, metrics, logs. As an industry-standard
    it is natively supported by a number of vendors.

extra:
  recipe-maintainers:
    - mariusvniekerk
